<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MadaTech</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card animate-fade-in">

    <div class="auth-logo">
      <div class="auth-logo-icon">H</div>
      <span class="auth-logo-text">MadaTech</span>
    </div>

    <h1 class="auth-title">Bon retour </h1>
    <p class="auth-subtitle">Connectez-vous à votre espace de gestion RH</p>

    <div class="form-group">
      <label class="form-label">Adresse email <span>*</span></label>
      <input type="email" class="form-control" placeholder="vous@entreprise.com" value="marie.dupont@hira.fr">
    </div>

    <div class="form-group">
      <div class="flex items-center justify-between mb-2">
        <label class="form-label" style="margin-bottom:0">Mot de passe <span>*</span></label>
        <a href="forgot-password.html" style="font-size:12px; color:var(--blue-light);">Mot de passe oublié ?</a>
      </div>
      <input type="password" class="form-control" placeholder="••••••••" value="password">
    </div>

    <div class="check-group mb-5">
      <div class="custom-check checked" id="remember-me"></div>
      <label for="remember-me" style="font-size:13px; color:var(--text-sec); cursor:pointer;" onclick="document.getElementById('remember-me').classList.toggle('checked')">Se souvenir de moi</label>
    </div>

    <!-- Demo role buttons -->
    <div style="background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.15); border-radius:10px; padding:14px; margin-bottom:20px;">
      <p style="font-size:11px; color:var(--text-muted); margin-bottom:10px; text-align:center; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;">Démo — Choisir un rôle</p>
      <div class="flex gap-2">
        <a href="pages/dashboard-employee.html" class="btn btn-card btn-sm" style="flex:1; font-size:11px;"> Employé</a>
        <a href="pages/dashboard-hr.html" class="btn btn-card btn-sm" style="flex:1; font-size:11px;"> RH</a>
        <a href="pages/dashboard-admin.html" class="btn btn-card btn-sm" style="flex:1; font-size:11px;"> Admin</a>
      </div>
    </div>

    <a href="pages/dashboard-employee.html">
      <button class="btn btn-primary btn-full btn-lg" style="background:var(--grad-mix);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        Se connecter
      </button>
    </a>

    <div class="auth-divider"><span>ou continuer avec</span></div>

    <div class="flex gap-3">
      <button class="btn btn-ghost btn-full" style="font-size:13px;">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn btn-ghost btn-full" style="font-size:13px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </button>
    </div>

    <div class="auth-footer">
      Pas encore de compte ? <a href="#">Contacter l'administrateur</a>
    </div>
  </div>
</div>
<script src="../assets/js/app.js"></script>
</body>
</html>
