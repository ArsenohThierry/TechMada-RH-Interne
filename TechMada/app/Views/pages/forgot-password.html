<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — MadaTech</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card animate-fade-in">

    <div class="auth-logo">
      <div class="auth-logo-icon">H</div>
      <span class="auth-logo-text">MadaTech</span>
    </div>

    <div style="width:56px;height:56px;background:rgba(59,130,246,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px;"></div>

    <h1 class="auth-title">Mot de passe oublié</h1>
    <p class="auth-subtitle">Saisissez votre adresse email et nous vous enverrons un lien de réinitialisation.</p>

    <div id="form-step" class="form-group">
      <label class="form-label">Adresse email <span>*</span></label>
      <input type="email" id="reset-email" class="form-control" placeholder="vous@entreprise.com">
    </div>

    <button class="btn btn-primary btn-full btn-lg" style="background:var(--grad-mix);" onclick="sendReset()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer le lien
    </button>

    <div id="success-msg" style="display:none; background:var(--success-bg); border:1px solid rgba(16,185,129,0.2); border-radius:12px; padding:16px; margin-top:16px; text-align:center;">
      <div style="font-size:24px; margin-bottom:8px;"></div>
      <div style="font-size:13.5px; font-weight:600; color:var(--success); margin-bottom:4px;">Email envoyé !</div>
      <div style="font-size:12px; color:var(--text-muted);">Vérifiez votre boîte de réception et suivez les instructions.</div>
    </div>

    <div class="auth-footer" style="margin-top:20px;">
      <a href="index.html" style="color:var(--blue-light); display:inline-flex; align-items:center; gap:6px; font-size:13px;">
        ← Retour à la connexion
      </a>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
function sendReset() {
  const email = document.getElementById('reset-email').value;
  if (!email) {
    showToast('Erreur', 'Veuillez saisir votre adresse email.', 'error');
    return;
  }
  document.getElementById('success-msg').style.display = 'block';
  showToast('Email envoyé', 'Vérifiez votre boîte de réception.', 'success');
}
</script>
</body>
</html>
